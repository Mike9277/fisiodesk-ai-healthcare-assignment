# Docker Compose for FisioDesk AI Query System
# Full stack with MongoDB, Flask API, and MongoDB Express

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: fisiodesk-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fisiodesk-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Seed - Import sample data using mongoimport (handles EJSON correctly)
  mongodb-seed:
    image: mongo:7.0
    container_name: fisiodesk-mongodb-seed
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    # FIX: use mongoimport which natively handles Extended JSON ($oid, $date)
    # mongosh + JSON.parse() does NOT convert $oid -> ObjectId or $date -> ISODate
    command: >
      bash -c "
        mongoimport --uri=mongodb://mongodb:27017/fisiodesk --collection=pazienti              --file=/data/pazienti.json              --jsonArray --drop &&
        mongoimport --uri=mongodb://mongodb:27017/fisiodesk --collection=schede_valutazione    --file=/data/schede_valutazione.json    --jsonArray --drop &&
        mongoimport --uri=mongodb://mongodb:27017/fisiodesk --collection=diario_trattamenti    --file=/data/diario_trattamenti.json    --jsonArray --drop &&
        mongoimport --uri=mongodb://mongodb:27017/fisiodesk --collection=eventi_calendario     --file=/data/eventi_calendario.json     --jsonArray --drop &&
        mongosh mongodb://mongodb:27017/fisiodesk --eval \"
          db.pazienti.createIndex({ professionista_principale: 1 });
          db.schede_valutazione.createIndex({ paziente_id: 1 });
          db.schede_valutazione.createIndex({ data: 1 });
          db.schede_valutazione.createIndex({ paziente_id: 1, data: -1 });
          db.diario_trattamenti.createIndex({ paziente_id: 1 });
          db.diario_trattamenti.createIndex({ data: 1 });
          db.diario_trattamenti.createIndex({ paziente_id: 1, data: -1 });
          db.eventi_calendario.createIndex({ paziente_id: 1 });
          db.eventi_calendario.createIndex({ data: 1 });
          db.eventi_calendario.createIndex({ stato: 1 });
          db.eventi_calendario.createIndex({ paziente_id: 1, data: -1 });
          print('Indexes created');
        \"
        echo 'Seed completed successfully'
      "
    networks:
      - fisiodesk-network

  # MongoDB Express - Web UI for database
  mongo-express:
    image: mongo-express:1.0.2
    container_name: fisiodesk-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27017"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fisiodesk-network

  # Flask API - AI Query Service
  fisiodesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fisiodesk-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_HOST: "0.0.0.0"
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
      MONGODB_URI: "mongodb://mongodb:27017"
      MONGODB_DB: "fisiodesk"
      AI_PROVIDER: "mock"
      TIMEFRAME_REFERENCE_DATE: "2024-12-31"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fisiodesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fisiodesk-network:
    driver: bridge

volumes:
  mongodb_data: